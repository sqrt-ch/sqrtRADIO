name: Build sqrtRADIO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: sqrtRADIO-linux
            icon: assets/sqrtR.png
          - os: windows-latest
            name: sqrtRADIO-windows.exe
            icon: assets/sqrtR.ico
          - os: macos-latest
            name: sqrtRADIO-macos
            icon: assets/sqrtR.icns

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install pyinstaller requests sounddevice numpy

      - name: Build .icns (macOS only)
        if: runner.os == 'macOS'
        run: |
          mkdir -p assets/sqrtR.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size assets/sqrtR.png --out assets/sqrtR.iconset/icon_${size}x${size}.png
          done
          sips -z 1024 1024 assets/sqrtR.png --out assets/sqrtR.iconset/icon_512x512@2x.png
          iconutil -c icns assets/sqrtR.iconset -o assets/sqrtR.icns

      - name: Build
        run: pyinstaller --onefile --noconsole --icon ${{ matrix.icon }} --name ${{ matrix.name }} sqrtRADIO.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
